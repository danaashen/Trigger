name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Используем актуальный macOS
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

     - name: Select Xcode
  run: sudo xcode-select -s /Applications/Xcode_16.app
