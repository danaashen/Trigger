name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Используем самую новую версию macOS на серверах GitHub
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        # Указываем современную версию Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build and Test
        run: |
          xcodebuild build \
            -project Trigger.xcodeproj \
            -scheme Trigger \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
